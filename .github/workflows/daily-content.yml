name: Daily content

on:
  schedule:
    - cron: '0 22 * * *'   # 22:00 UTC = 06:00 BJT (UTC+8)
  workflow_dispatch:         # Allow manual trigger for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Required for git push via GITHUB_TOKEN

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate and commit daily content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -eo pipefail
          TODAY_FILE=$(python -c "from scripts.content_utils import get_beijing_date, content_path; print(content_path(get_beijing_date()))")
          if [ -f "$TODAY_FILE" ]; then
            echo "Content for $(basename "$TODAY_FILE" .md) already exists — skipping."
            exit 0
          fi
          python -m scripts.feed_article | \
          python -m scripts.generate_exercises | \
          python -m scripts.commit_content

  build-and-deploy:
    needs: generate-content
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install website dependencies
        working-directory: ./website
        run: npm ci

      - name: Build Astro site
        working-directory: ./website
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/dist

      - uses: actions/deploy-pages@v4
        id: deploy
